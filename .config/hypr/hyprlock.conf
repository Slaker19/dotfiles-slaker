background {
    monitor =
    path = __WALLPAPER_DIR__/nebula_purple.png
    blur_passes = 2
    blur_size = 6
    contrast = 0.8
    brightness = 0.7
    vibrancy = 0.2
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +%H:%M)"
    color = rgba(205, 214, 244, 0.85)
    font_size = 96
    font_family = JetBrains Mono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600] echo "$(date +"%A, %d %B %Y")"
    color = rgba(205, 214, 244, 0.5)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(123, 58, 237, 0.4)
    inner_color = rgba(10, 10, 20, 0.6)
    font_color = rgba(205, 214, 244, 0.8)
    fade_on_empty = true
    fade_timeout = 1
    placeholder_text = <i>Contraseña...</i>
    hide_input = false
    rounding = 12
    check_color = rgba(187, 134, 252, 0.6)
    fail_color = rgba(243, 139, 168, 0.8)
    fail_text = <i>¡Incorrecta!</i>
    position = 0, -80
    halign = center
    valign = center
}
