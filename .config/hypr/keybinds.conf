$mainMod = SUPER

# Window management (Jakoolit-style)
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod CTRL, F, fullscreen, 1
bind = $mainMod, SPACE, exec, ~/.config/hypr/scripts/default-size.sh
bind = $mainMod ALT, SPACE, exec, hyprctl dispatch workspaceopt allfloat
bind = $mainMod, G, togglegroup
bind = $mainMod, P, pseudo,
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod, U, togglespecialworkspace,
bind = $mainMod, Tab, exec, qs ipc -c overview call overview toggle
bind = $mainMod SHIFT, Tab, workspace, m-1

# Focus movement (Vim/Arrow keys)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows (Jakoolit: SUPER + CTRL + arrows)
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# Resize windows (Jakoolit: SUPER + SHIFT + arrows)
binde = $mainMod SHIFT, H, resizeactive, -50 0
binde = $mainMod SHIFT, L, resizeactive, 50 0
binde = $mainMod SHIFT, K, resizeactive, 0 -50
binde = $mainMod SHIFT, J, resizeactive, 0 50
binde = $mainMod SHIFT, left, resizeactive, -50 0
binde = $mainMod SHIFT, right, resizeactive, 50 0
binde = $mainMod SHIFT, up, resizeactive, 0 -50
binde = $mainMod SHIFT, down, resizeactive, 0 50

# Swap windows (Jakoolit: SUPER + ALT + arrows)
bind = $mainMod ALT, H, swapwindow, l
bind = $mainMod ALT, L, swapwindow, r
bind = $mainMod ALT, K, swapwindow, u
bind = $mainMod ALT, J, swapwindow, d
bind = $mainMod ALT, left, swapwindow, l
bind = $mainMod ALT, right, swapwindow, r
bind = $mainMod ALT, up, swapwindow, u
bind = $mainMod ALT, down, swapwindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1

# Launch apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, R, exec, rofi -show run -theme ~/.config/rofi/themes/purple.rasi
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager

# Screenshots
bind = $mainMod, Print, exec, grim -g "$(slurp)"
bind = $mainMod SHIFT, Print, exec, grim -o "$(hyprctl monitors -j | jq -r '.[0].name')"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)"

# Lock
bind = $mainMod, Backspace, exec, $lock
bind = $mainMod SHIFT, L, exec, $lock

# Notification center
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod SHIFT, O, exec, ~/.config/hypr/scripts/toggle-blur.sh
bind = $mainMod CTRL, K, exec, qt6ct

# Power menu
bind = $mainMod SHIFT, Escape, exec, wlogout

# Media keys
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-notify.sh up 5
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-notify.sh down 5
bindel = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume-notify.sh mute
bindel = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness-notify.sh up 5
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-notify.sh down 5
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod ALT, mouse:272, resizewindow

# Wallpaper selector
bind = $mainMod, W, exec, ~/.config/custom_wall_paper/wallpicker __WALLPAPER_DIR__
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/cliphist.sh
bind = $mainMod CTRL, M, exec, nwg-displays
