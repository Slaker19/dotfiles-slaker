# Minimal Hyprland configuration
# Monitor setup (adjust to your monitor identifiers)
monitor=DP-1,1920x1080@60,0x0,1

# Autostart applications
exec-once = $HOME/.config/hypr/startup.sh
exec = waybar
exec = rofi -show drun

# Example keybinds (customize as needed)
# $mod = SUPER
# bind = $mod,RETURN,exec,ghostty
# bind = $mod,SPACE,exec,rofi -show drun
